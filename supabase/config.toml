# Supabase Local Development Configuration
# This file is generated as a fallback configuration for manual setup
# Generated: 2025-01-18
# Note: This is a placeholder. The actual config will be generated by `supabase init` or `supabase start`

[project]
# Project ref is generated by Supabase on init
# For local development, this will be auto-generated
project_id = "discoveryos_local"
# API host will be localhost:54321 when running locally
# db_url = "postgresql://postgres:postgres@localhost:5432/postgres"

[api]
# API port for Supabase API server
port = 54321
# Disable API signature requirement for local development
disable_api_signing = false

[db]
# PostgreSQL port
port = 5432
# Default database name
database = "postgres"
# Default user for local PostgreSQL
user = "postgres"
# Default password for local PostgreSQL (CHANGE IN PRODUCTION)
password = "postgres"

[auth]
# JWT secret (auto-generated by supabase init)
# Keep this secret and consistent across restarts
jwt_secret = "super-secret-jwt-token-change-me-in-production"
# JWT expiry in seconds (7 days)
jwt_exp = 604800
# Enable/disable email confirmations
enable_email_confirmations = true
# Enable/disable phone confirmations
enable_phone_confirmations = false

[storage]
# Storage bucket for file uploads
bucket_name = "documents"

[analytics]
# Disable analytics for local development
enabled = false

[functions]
# Node.js version for edge functions
node_version = "18"

[vector]
# Enable Supabase Vector (pgvector extension)
enabled = true

# ============================================================================
# NOTES FOR LOCAL DEVELOPMENT
# ============================================================================
#
# To initialize and start Supabase locally:
#
# 1. Install Supabase CLI:
#    npm install -g supabase
#
# 2. Initialize project (creates supabase/config.toml):
#    supabase init
#
# 3. Start local Supabase stack:
#    supabase start
#
# 4. Run migrations:
#    supabase db reset
#
# 5. View local Supabase Studio:
#    Open http://localhost:54323 in browser
#
# Environment variables will be output in the terminal
# Copy them to .env.local for use in your application
#
# To stop the local stack:
#    supabase stop
#
# To reset the database (re-run migrations):
#    supabase db reset
#
# ============================================================================
